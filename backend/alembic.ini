# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, relative to alembic.ini location
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

version_locations = %(here)s/app/database/migrations/versions

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5.5s: %(message)s
datefmt = %H:%M:%S
